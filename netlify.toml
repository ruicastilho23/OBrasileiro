[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/subscribe"
  [headers.values]
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/subscribe"
  to = "/subscribe.html"
  status = 200

[[redirects]]
  from = "/meal-plan"
  to = "/meal-plan.html"
  status = 200

[[redirects]]
  from = "/confirmation"
  to = "/index.html"
  status = 200
